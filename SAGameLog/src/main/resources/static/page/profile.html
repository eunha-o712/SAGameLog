<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>프로필 검색</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container">

    <h1>프로필 검색</h1>
    <p class="sub-text">닉네임으로 서든어택 유저 정보를 조회합니다.</p>

    <div class="nav">
        <a href="/">홈</a>
    </div>

    <div class="search-box">
        <input type="text" id="nicknameInput" placeholder="닉네임 입력">
        <button onclick="searchProfile()">검색</button>
    </div>

    <div id="loadingMsg" class="loading">불러오는 중...</div>
    <div id="errorMsg" class="error"></div>

    <div id="profileCard" class="card" style="display:none;">
        <div id="profileContent"></div>
    </div>

    <div id="recentMatchArea" class="card" style="display:none; margin-top:20px;"></div>

</div>

<script src="/js/profile.js"></script>
</body>
</html>
