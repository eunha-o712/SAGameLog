<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>전적 검색</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container">
    <h1>전적 검색</h1>
    <p class="sub-text">게임 모드와 매치 유형으로 최근 전적을 조회합니다.</p>

    <div class="nav">
        <a href="/">홈</a>
    </div>

    <div class="card">
        <div class="row"><b>플레이어</b> : <span id="playerName">불러오는 중...</span></div>
    </div>

    <div class="card" style="margin-top:20px;">
        <div class="row">
            <b>게임 모드</b>
            <select id="matchModeSelect">
                <option value="개인전">개인전</option>
                <option value="데스매치">데스매치</option>
                <option value="폭파미션" selected>폭파미션</option>
                <option value="진짜를 모아라">진짜를 모아라</option>
            </select>
        </div>

        <div class="row">
            <b>매치 유형</b>
            <select id="matchTypeSelect"></select>
        </div>

        <div class="row" style="margin-top:20px;">
            <button id="searchBtn">검색</button>
            <button id="resetBtn" type="button">초기화</button>
        </div>
    </div>

    <div id="matchArea" class="card" style="margin-top:20px;">
        <p>전적 불러오는 중...</p>
    </div>
</div>

<script src="/js/matches.js"></script>
</body>
</html>
